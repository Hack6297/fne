services:
  - type: web
    name: funnynetworkengine
    runtime: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT fne.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
